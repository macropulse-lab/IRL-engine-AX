version: "3.9"

# Standalone IRL Engine — no external dependencies.
# Uses the built-in mock MTA (MTA_MODE=mock) and its own PostgreSQL instance.
# For evaluation and development only — not for production.
#
# Usage:
#   docker compose -f docker-compose.standalone.yml up -d
#   curl http://localhost:4000/irl/health

services:
  irl-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: irl-engine-standalone
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://irl:irl@postgres:5432/irl
      # Mock MTA — no MacroPulse account required
      MTA_MODE: mock
      # Tokens for the evaluation client — ROTATE before exposing to networks
      # Generate with: openssl rand -hex 32
      IRL_API_TOKENS: demo-token-replace-before-use
      # Layer 2 heartbeats off for simplicity in standalone mode
      LAYER2_ENABLED: "false"
      BIND_SIZE_TOLERANCE: "0.0001"
      TRACE_EXPIRY_MS: "3600000"
      TIME_SOURCE: System
      PORT: 4000
      RUST_LOG: irl_engine=info,tower_http=debug
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/irl/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgautomata/pgpartman:pg15
    container_name: irl-postgres-standalone
    restart: unless-stopped
    environment:
      POSTGRES_USER: irl
      POSTGRES_PASSWORD: irl
      POSTGRES_DB: irl
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command: >
      postgres
      -c shared_preload_libraries=pg_partman_bgw
      -c pg_partman_bgw.interval=3600
      -c pg_partman_bgw.role=irl
      -c pg_partman_bgw.dbname=irl
    volumes:
      - irl_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irl"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  irl_pg_data:
