version: "3.9"

# Extends the MacroPulse Docker network so the IRL engine can reach:
# - macropulse-api (for MTA /regime/current)
# - timescaledb (shared database, separate irl schema)

services:
  irl-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: irl-engine
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MTA_URL: ${MTA_URL:-http://macropulse-api:8000}
      MTA_PUBKEY_HEX: ${MTA_PUBKEY_HEX}
      IRL_API_TOKENS: ${IRL_API_TOKENS}
      TIME_SOURCE: ${TIME_SOURCE:-System}
      MAX_HEARTBEAT_DRIFT_MS: ${MAX_HEARTBEAT_DRIFT_MS:-200}
      LAYER2_ENABLED: ${LAYER2_ENABLED:-true}
      PORT: 4000
      RUST_LOG: irl_engine=info,tower_http=debug
    networks:
      - macropulse_default
    depends_on:
      - timescaledb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/irl/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Reference to the MacroPulse TimescaleDB — not re-defined here,
  # included only to express the depends_on relationship.
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    external: true

networks:
  macropulse_default:
    external: true
    name: macropulse_default
